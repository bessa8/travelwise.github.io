<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Opening TravelWise…</title>
<style>
  :root { color-scheme: light dark; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center;
    background: #F5F1E8; color: #1a1a1a;
    padding: 24px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #F5F1E8; }
    .card { background: #262320; }
    .btn { background: #F5F1E8; color: #1a1a1a; }
  }
  .card {
    max-width: 420px; width: 100%;
    background: #fff; border-radius: 18px;
    padding: 32px 28px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  h1 { font-size: 22px; margin: 0 0 8px; font-weight: 600; }
  p  { font-size: 15px; line-height: 1.55; opacity: 0.78; margin: 0 0 20px; }
  .btn {
    display: inline-block; padding: 12px 22px;
    background: #1a1a1a; color: #F5F1E8;
    border-radius: 999px; text-decoration: none;
    font-weight: 600; font-size: 14px;
  }
  .err { color: #b3261e; }
  .small { font-size: 12px; opacity: 0.6; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <h1 id="title">Opening TravelWise…</h1>
    <p id="message">If the app doesn't open automatically, tap the button below.</p>
    <a id="open" class="btn" href="#">Open TravelWise</a>
    <p class="small">Make sure TravelWise is installed on this device.</p>
  </div>

<script>
(function () {
  var APP_SCHEME = "travelwise://login-callback";

  // Preserve everything Supabase appended (query string + fragment).
  // PKCE flow uses ?code=…; legacy/implicit flow uses #access_token=…&type=…
  var search = window.location.search || "";
  var hash   = window.location.hash   || "";
  var deepLink = APP_SCHEME + search + hash;

  var openLink = document.getElementById("open");
  openLink.setAttribute("href", deepLink);

  // Surface explicit Supabase errors instead of silently bouncing to the app.
  var params = new URLSearchParams(
    search.replace(/^\?/, "") + "&" + hash.replace(/^#/, "")
  );
  var err = params.get("error_description") || params.get("error");
  if (err) {
    document.getElementById("title").textContent = "Couldn't complete sign-in";
    document.getElementById("title").classList.add("err");
    document.getElementById("message").textContent = decodeURIComponent(err);
    return;
  }

  // Auto-attempt the deep link. Mobile browsers will prompt to open the app;
  // desktop browsers will no-op, and the user falls back to the button.
  setTimeout(function () { window.location.href = deepLink; }, 50);
})();
</script>
</body>
</html>
